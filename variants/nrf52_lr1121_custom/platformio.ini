[nrf52_lr1121_custom]
extends = nrf52_base
board = promicro_nrf52840
build_flags = ${nrf52_base.build_flags}
    -I variants/nrf52_lr1121_custom
    -D NRF52_LR1121_CUSTOM
    -D RADIO_CLASS=CustomLR1110
    -D WRAPPER_CLASS=CustomLR1110Wrapper
    -D LORA_TX_POWER=22
    -D MAX_LORA_TX_POWER=22
    -D P_LORA_MISO=36
    -D P_LORA_MOSI=11
    -D P_LORA_SCLK=32
    -D P_LORA_NSS=38
    -D P_LORA_BUSY=24
    -D P_LORA_DIO1=20
    -D P_LORA_DIO2=17
    -D P_LORA_DIO3=9
    -D P_LORA_RESET=22
build_src_filter = ${nrf52_base.build_src_filter}
  +<helpers/sensors>
  +<../variants/nrf52_lr1121_custom>
lib_deps= ${nrf52_base.lib_deps}
  adafruit/Adafruit INA3221 Library @ ^1.0.1
  adafruit/Adafruit INA219 @ ^1.2.3
  adafruit/Adafruit AHTX0 @ ^2.0.5
  adafruit/Adafruit BME280 Library @ ^2.3.0
  adafruit/Adafruit BMP280 Library@^2.6.8
  stevemarple/MicroNMEA @ ^2.0.6

[env:nrf52_lr1121_companion_ble]
extends = nrf52_lr1121_custom
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags = ${nrf52_lr1121_custom.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
build_src_filter = ${nrf52_lr1121_custom.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${nrf52_lr1121_custom.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0

[env:nrf52_lr1121_repeater]
extends = nrf52_lr1121_custom
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
build_src_filter = ${nrf52_lr1121_custom.build_src_filter}
  +<../examples/simple_repeater>
build_flags =
  ${nrf52_lr1121_custom.build_flags}
  -D ADVERT_NAME='"NRF52 Custom Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps = ${nrf52_lr1121_custom.lib_deps}
  adafruit/RTClib @ ^2.1.3